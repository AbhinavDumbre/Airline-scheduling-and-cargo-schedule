<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flight Scheduler</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="shell">
        <aside class="side">
            <div class="logo">Sky<span>Logic</span> AI</div>
            <nav class="nav">
                <a href="index.html">Dashboard</a>
                <a class="active" href="schedule.html">Flight Scheduler</a>
                <a href="cargo.html">Cargo Manager</a>
                <a href="optimizer.html">AI Optimizer</a>
                <a href="reports.html">Reports</a>
            </nav>
        </aside>
        <main class="main">
            <div class="topbar">
                <h2>Flight Scheduler</h2>
                <span class="pill">AI Conflict Check</span>
            </div>
            <div class="grid grid-2">
                <div class="card">
                    <div class="card-title">Schedule New Flight</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Origin</label>
                            <select id="origin">
                                <option>BOM</option>
                                <option>DEL</option>
                                <option>BLR</option>
                                <option>DXB</option>
                                <option>LHR</option>
                                <option>JFK</option>
                                <option>SIN</option>
                                <option>SYD</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Destination</label>
                            <select id="dest">
                                <option>LHR</option>
                                <option>JFK</option>
                                <option>SIN</option>
                                <option>DXB</option>
                                <option>SYD</option>
                                <option>NRT</option>
                                <option>BOM</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Time</label>
                            <input id="time" type="time" value="09:30">
                        </div>
                        <div class="form-group">
                            <label>Aircraft</label>
                            <select id="aircraft">
                                <option>Boeing 777-300ER</option>
                                <option>Airbus A350-900</option>
                                <option>Boeing 787-9 Dreamliner</option>
                                <option>Airbus A380-800</	option]
                                [Option]Boeing 737 MAX 8[/Option]
                            [/Select]
                        [/Div]
                    [/Div]
                [/Div]
            [/Div]
        [/Div]
    [/Div]

    [Script Src="Assets/App.js"][/Script]
[/Body]

[/Html]
